services:
  api_photo_f4:
    build:
      context: .
      dockerfile: Dockerfile
    image: api_photo_f4
    container_name: fenixbot
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8025}
      SESSION_FILE: /app/data/session_fenixbot
      STATE_FILE: /app/data/api_state.json
      PGCLIENTENCODING: ${PGCLIENTENCODING:-UTF8}
      DB_OPTIONS: ${DB_OPTIONS:-}
    ports:
      - "${PORT:-8025}:${PORT:-8025}"
    volumes:
      - ./data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
